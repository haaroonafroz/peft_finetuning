# Qwen3-8B fine-tuned on MedQA (USMLE) with QLoRA
# Inherits from default.yaml — only overrides are listed here.

model:
  name_or_path: "Qwen/Qwen3-8B"
  trust_remote_code: True
  attn_implementation: "sdpa"

dataset:
  name: "GBaker/MedQA-USMLE-4-options"
  subset: null

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  # Auto-detected if null; override to target specific layers
  target_modules: null

training:
  run_name: "qwen3-medqa-QLORA-3Epochs-r8-a16"
  output_dir: "outputs"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4