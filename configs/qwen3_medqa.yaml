# Qwen3-8B fine-tuned on MedQA (USMLE) with QLoRA
# Inherits from default.yaml — only overrides are listed here.

model:
  name_or_path: "Qwen/Qwen3-8B"

dataset:
  name: "GBaker/MedQA-USMLE-4-options"
  subset: null

training:
  run_name: "qwen3-medqa-QLORA-3Epochs-v1"
  output_dir: "outputs/qwen3-medqa"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4